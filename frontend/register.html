<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parkin | Register</title>

  <style>
    :root{
      --bg:#061229;
      --text:#ffffff;
      --muted:#b8cae6;
      --cyan:#18d8f3;
      --cyan-2:#0aa8c9;
      --navy:#061229;
      --navy-2:#0b1d42;
      --white:#ffffff;
      --font:Inter,Segoe UI,Roboto,Arial,sans-serif;

      --login-bg:url("./assets/auth/parkin-login-bg.png");
    }

    *{box-sizing:border-box}

    html{scroll-behavior:smooth}

    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font);
      color:var(--text);
      background:#061229;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,input{
      font-family:inherit;
    }

    .hidden{display:none !important}

    .container{
      width:min(1320px,88%);
      margin:0 auto;
    }

    .page{
      position:relative;
      min-height:calc(100vh - 79px);
      overflow:hidden;
    }

    /* ================= NAV ================= */

    .nav{
      position:sticky;
      top:0;
      z-index:999;
      padding:10px 0;
      background:
        linear-gradient(90deg,rgba(2,10,26,.84),rgba(5,20,48,.78)),
        radial-gradient(circle at 24% 0%,rgba(17,181,212,.20),transparent 34%),
        radial-gradient(circle at 82% 40%,rgba(255,255,255,.08),transparent 28%);
      border-bottom:1px solid rgba(164,226,255,.20);
      box-shadow:
        0 20px 60px rgba(2,10,26,.26),
        inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter:blur(26px) saturate(145%);
      -webkit-backdrop-filter:blur(26px) saturate(145%);
    }

    .nav::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent),
        radial-gradient(circle at 50% 100%,rgba(17,181,212,.16),transparent 38%);
      opacity:.75;
    }

    .nav::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-1px;
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(24,216,243,.85),transparent);
      box-shadow:0 0 18px rgba(24,216,243,.60);
      pointer-events:none;
    }

    .nav-inner{
      position:relative;
      z-index:2;
      min-height:58px;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:18px;
    }

    .brand{
      width:max-content;
      display:flex;
      align-items:center;
      gap:12px;
      color:#fff;
      font-size:22px;
      font-weight:950;
      letter-spacing:-.8px;
      white-space:nowrap;
    }

    .brand-logo-glass{
      position:relative;
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:18px;
      background:
        linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.05)),
        rgba(255,255,255,.04);
      border:1px solid rgba(150,231,255,.30);
      box-shadow:
        0 16px 34px rgba(17,181,212,.16),
        inset 0 1px 0 rgba(255,255,255,.30),
        inset 0 -1px 0 rgba(17,181,212,.12);
      overflow:hidden;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .brand-logo-glass::before{
      content:"";
      position:absolute;
      inset:6px;
      border-radius:14px;
      background:
        radial-gradient(circle at 34% 26%,rgba(255,255,255,.18),transparent 38%),
        linear-gradient(135deg,rgba(22,201,224,.18),rgba(8,128,156,.10));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 0 18px rgba(17,181,212,.16);
      opacity:.72;
    }

    .brand-logo-glass::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.34),transparent 42%);
      pointer-events:none;
    }

    .brand-logo-glass img{
      position:relative;
      z-index:2;
      width:36px;
      height:36px;
      object-fit:contain;
      display:block;
    }

    .nav-links{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:7px;
      border-radius:22px;
      background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -1px 0 rgba(24,216,243,.10),
        0 18px 44px rgba(0,0,0,.16);
      backdrop-filter:blur(22px) saturate(160%);
      -webkit-backdrop-filter:blur(22px) saturate(160%);
    }

    .nav-link{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:0;
      background:transparent;
      color:rgba(255,255,255,.88);
      font-size:14px;
      font-weight:850;
      padding:10px 18px;
      border-radius:16px;
      cursor:pointer;
      transition:.22s ease;
      overflow:hidden;
    }

    .nav-link::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:
        linear-gradient(135deg,rgba(255,255,255,.22),rgba(255,255,255,.04)),
        radial-gradient(circle at 50% 0%,rgba(24,216,243,.22),transparent 60%);
      border:1px solid rgba(255,255,255,.12);
      opacity:0;
      transition:.22s ease;
    }

    .nav-link:hover::before,
    .nav-link.active::before{opacity:1}

    .nav-link:hover,
    .nav-link.active{
      color:#fff;
      text-shadow:0 0 16px rgba(255,255,255,.28);
      transform:translateY(-1px);
    }

    .nav-actions{
      justify-self:end;
      display:flex;
      align-items:center;
      gap:10px;
      white-space:nowrap;
    }

    .btn{
      min-height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:11px 17px;
      border:0;
      border-radius:14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      transition:.18s ease;
      text-decoration:none;
    }

    .btn:hover{transform:translateY(-1px)}

    .btn-primary{
      color:#fff;
      background:linear-gradient(135deg,#18d8f3 0%,#0aa8c9 100%);
      border:1px solid rgba(255,255,255,.32);
      box-shadow:
        0 18px 42px rgba(17,181,212,.32),
        inset 0 1px 0 rgba(255,255,255,.28);
    }

    .nav .btn-primary{
      min-height:46px;
      padding:12px 22px;
      border-radius:16px;
      box-shadow:
        0 18px 44px rgba(17,181,212,.34),
        0 0 26px rgba(24,216,243,.18),
        inset 0 1px 0 rgba(255,255,255,.36);
    }

    /* ================= REGISTER BACKGROUND ================= */

    .register-page{
      position:relative;
      min-height:calc(100vh - 79px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:42px 0 54px;
      background:
        linear-gradient(180deg,rgba(2,9,27,.08),rgba(2,9,27,.24)),
        var(--login-bg) center center / cover no-repeat;
      isolation:isolate;
    }

    .register-page::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:-1;
      background:
        radial-gradient(circle at 50% 24%,rgba(24,216,243,.12),transparent 28%),
        linear-gradient(90deg,rgba(1,7,22,.30),rgba(1,9,28,.05) 45%,rgba(1,7,22,.24)),
        linear-gradient(180deg,rgba(0,7,22,.10),rgba(0,7,22,.38));
      pointer-events:none;
    }

    .register-page::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:-1;
      background:
        radial-gradient(circle at 50% 50%,transparent 0 28%,rgba(1,7,22,.20) 62%,rgba(1,7,22,.42) 100%);
      pointer-events:none;
    }

    /* ================= AUTH CARD ================= */

    .auth-wrap{
      position:relative;
      width:min(780px,94%);
      margin:0 auto;
      padding:38px 62px 38px;
      border-radius:34px;
      background:
        linear-gradient(145deg,rgba(24,68,116,.38),rgba(7,20,50,.42)),
        radial-gradient(circle at 50% 0%,rgba(24,216,243,.10),transparent 34%);
      border:1.5px solid rgba(179,230,255,.82);
      box-shadow:
        0 0 0 1px rgba(24,216,243,.26),
        0 0 34px rgba(140,218,255,.60),
        0 0 86px rgba(24,216,243,.18),
        0 34px 100px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.24),
        inset 0 -1px 0 rgba(24,216,243,.18);
      backdrop-filter:blur(24px) saturate(155%);
      -webkit-backdrop-filter:blur(24px) saturate(155%);
      overflow:hidden;
    }

    .auth-wrap::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:
        linear-gradient(135deg,rgba(255,255,255,.16),transparent 36%),
        radial-gradient(circle at 50% 0%,rgba(24,216,243,.20),transparent 28%);
      pointer-events:none;
    }

    .auth-wrap::after{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:inherit;
      background:
        linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent);
      opacity:.18;
      pointer-events:none;
      filter:blur(10px);
    }

    .auth-top,
    .auth-body{
      position:relative;
      z-index:2;
    }

    .auth-top{
      text-align:center;
      margin-bottom:28px;
    }

    .auth-logo{
      position:relative;
      width:82px;
      height:82px;
      margin:0 auto 22px;
      display:grid;
      place-items:center;
      border-radius:24px;
      background:linear-gradient(135deg,#28efff,#08a7cd);
      border:1px solid rgba(255,255,255,.46);
      box-shadow:
        0 0 0 8px rgba(24,216,243,.10),
        0 0 42px rgba(24,216,243,.55),
        0 20px 40px rgba(0,0,0,.20),
        inset 0 1px 0 rgba(255,255,255,.42);
      overflow:hidden;
    }

    .auth-logo::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.28),transparent 48%);
      pointer-events:none;
    }

    .auth-logo img{
      position:relative;
      z-index:2;
      width:58px;
      height:58px;
      object-fit:contain;
      display:block;
    }

    .auth-top h1{
      margin:0 0 12px;
      color:#fff;
      font-size:clamp(32px,3vw,48px);
      line-height:1;
      letter-spacing:-1.6px;
      font-weight:1000;
      text-shadow:0 12px 36px rgba(0,0,0,.28);
    }

    .auth-top p{
      margin:0;
      color:rgba(225,238,255,.78);
      font-size:19px;
      line-height:1.45;
      font-weight:500;
    }

    .field{
      position:relative;
      margin-bottom:20px;
    }

    .field-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:10px;
    }

    .field label{
      color:#fff;
      font-size:16px;
      font-weight:900;
    }

    .link-btn{
      border:0;
      padding:0;
      background:transparent;
      color:#16d9ff;
      font-size:16px;
      font-weight:950;
      cursor:pointer;
      text-decoration:none;
      transition:.18s ease;
    }

    .link-btn:hover{
      color:#76f3ff;
      text-shadow:0 0 18px rgba(24,216,243,.38);
    }

    .input-shell{
      position:relative;
      display:flex;
      align-items:center;
    }

    .input-icon{
      position:absolute;
      left:24px;
      width:24px;
      height:24px;
      display:grid;
      place-items:center;
      color:#b9d9ff;
      opacity:.95;
      pointer-events:none;
    }

    .input-icon svg{
      width:24px;
      height:24px;
      display:block;
    }

    .input{
      width:100%;
      min-height:62px;
      padding:0 58px 0 66px;
      color:#fff;
      background:
        linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.04)),
        rgba(19,58,105,.34);
      border:1px solid rgba(174,221,255,.54);
      border-radius:17px;
      outline:none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 13px 30px rgba(0,0,0,.12);
      font-size:20px;
      font-weight:600;
      transition:.2s ease;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .input::placeholder{
      color:rgba(225,238,255,.68);
    }

    .input:focus{
      border-color:rgba(24,216,243,.92);
      box-shadow:
        0 0 0 3px rgba(24,216,243,.12),
        0 0 24px rgba(24,216,243,.20),
        inset 0 1px 0 rgba(255,255,255,.20);
    }

    .eye-btn{
      position:absolute;
      right:20px;
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border:0;
      background:transparent;
      color:#b9d9ff;
      cursor:pointer;
      opacity:.95;
    }

    .eye-btn svg{
      width:25px;
      height:25px;
      display:block;
    }

    .error{
      display:none;
      margin-top:8px;
      color:#ffb7c0;
      font-size:13px;
      font-weight:800;
    }

    .btn-wide{
      width:100%;
      min-height:66px;
      margin-top:4px;
      border-radius:17px;
      font-size:21px;
      font-weight:1000;
      background:linear-gradient(135deg,#23e7f6,#08aad0);
      border:1px solid rgba(203,252,255,.62);
      box-shadow:
        0 20px 42px rgba(24,216,243,.34),
        0 0 28px rgba(24,216,243,.40),
        inset 0 1px 0 rgba(255,255,255,.45),
        inset 0 -1px 0 rgba(0,84,112,.26);
    }

    .auth-switch{
      margin-top:28px;
      text-align:center;
      color:#fff;
      font-size:21px;
      font-weight:500;
    }

    .auth-switch .link-btn{
      margin-left:8px;
      font-size:21px;
    }

    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:2000;
      display:none;
      max-width:360px;
      padding:13px 16px;
      border-radius:14px;
      color:#fff;
      background:#061229;
      box-shadow:0 20px 44px rgba(0,0,0,.22);
      font-size:14px;
      font-weight:800;
    }

    /* ================= RESPONSIVE ================= */

    @media(max-width:900px){
      .nav-inner{
        grid-template-columns:1fr auto;
        padding:4px 0;
      }

      .nav-links{
        grid-column:1 / -1;
        width:100%;
        justify-content:center;
        overflow:auto;
      }

      .register-page{
        min-height:auto;
        padding:48px 0 70px;
        background-position:center center;
      }

      .auth-wrap{
        width:min(680px,92%);
        padding:42px 34px 40px;
      }
    }

    @media(max-width:620px){
      .container{width:92%}

      .nav-actions .btn-primary{display:none}

      .brand-logo-glass{
        width:44px;
        height:44px;
        border-radius:16px;
      }

      .brand-logo-glass img{
        width:32px;
        height:32px;
      }

      .nav-link{
        padding:10px 13px;
        font-size:13px;
      }

      .register-page{
        padding:34px 0 58px;
      }

      .auth-wrap{
        width:94%;
        padding:34px 20px 32px;
        border-radius:28px;
      }

      .auth-logo{
        width:74px;
        height:74px;
        border-radius:22px;
        margin-bottom:20px;
      }

      .auth-logo img{
        width:52px;
        height:52px;
      }

      .auth-top{
        margin-bottom:24px;
      }

      .auth-top h1{
        font-size:30px;
        letter-spacing:-1px;
      }

      .auth-top p{
        font-size:16px;
      }

      .field{
        margin-bottom:18px;
      }

      .field label,
      .link-btn{
        font-size:14px;
      }

      .input{
        min-height:58px;
        padding-left:58px;
        padding-right:52px;
        font-size:17px;
        border-radius:15px;
      }

      .input-icon{
        left:20px;
      }

      .btn-wide{
        min-height:62px;
        font-size:18px;
      }

      .auth-switch{
        font-size:17px;
      }

      .auth-switch .link-btn{
        display:inline-block;
        font-size:17px;
        margin-left:5px;
      }
    }
  </style>
</head>

<body data-page="register">
  <div id="toast" class="toast"></div>

  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-logo-glass">
          <img src="./assets/home/parkin-nav-logo.png" alt="Parkin logo">
        </div>
      </a>

      <div class="nav-links">
        <a class="nav-link" href="destinations.html">Destinations</a>
        <a class="nav-link" href="how.html">How it Works</a>
        <a class="nav-link" href="about.html">About</a>
      </div>

      <div class="nav-actions">
        <a id="navSignIn" class="nav-link" href="login.html">Sign In</a>
        <a id="navDashboard" class="nav-link hidden" href="dashboard.html">Dashboard</a>
        <button class="btn btn-primary" onclick="getStarted()">Get Started</button>
      </div>
    </div>
  </nav>

  <main class="page">
    <section class="register-page">
      <div class="container">
        <div class="auth-wrap">
          <div class="auth-top">
            <div class="auth-logo">
              <img src="./assets/home/parkin-nav-logo.png" alt="Parkin logo">
            </div>

            <h1>Create Your Account</h1>
            <p>Register once and start booking your parking sessions.</p>
          </div>

          <div class="auth-body">
            <form id="registerForm" onsubmit="registerUser(event)">
              <div class="field">
                <div class="field-row">
                  <label for="registerName">Full name</label>
                </div>

                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M12 12.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Z" stroke="currentColor" stroke-width="1.8"/>
                      <path d="M4.5 20.2c.9-4.1 3.6-6.2 7.5-6.2s6.6 2.1 7.5 6.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                  </span>

                  <input
                    id="registerName"
                    class="input"
                    type="text"
                    placeholder="Omar Tarek"
                    value="Omar Tarek"
                  />
                </div>

                <div class="error">Please enter your full name.</div>
              </div>

              <div class="field">
                <div class="field-row">
                  <label for="registerEmail">Email address</label>
                </div>

                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M4.5 6.5h15a1.8 1.8 0 0 1 1.8 1.8v8.9a1.8 1.8 0 0 1-1.8 1.8h-15a1.8 1.8 0 0 1-1.8-1.8V8.3a1.8 1.8 0 0 1 1.8-1.8Z" stroke="currentColor" stroke-width="1.8"/>
                      <path d="m4 8 8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </span>

                  <input
                    id="registerEmail"
                    class="input"
                    type="email"
                    placeholder="name@example.com"
                    value="omar@parkin.com"
                  />
                </div>

                <div class="error">Please enter a valid email.</div>
              </div>

              <div class="field">
                <div class="field-row">
                  <label for="registerPhone">Phone number</label>
                </div>

                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M8.1 4.4 10 8.7c.3.7.1 1.5-.5 2l-1.1.9c.9 1.9 2.3 3.4 4.2 4.2l.9-1.1c.5-.6 1.3-.8 2-.5l4.3 1.9c.8.3 1.2 1.2 1 2l-.5 2.1c-.2.8-.9 1.3-1.7 1.3C9.8 21.5 2.5 14.2 2.5 5.4c0-.8.5-1.5 1.3-1.7l2.1-.5c.9-.2 1.7.3 2.2 1.2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    </svg>
                  </span>

                  <input
                    id="registerPhone"
                    class="input"
                    type="tel"
                    placeholder="+20 100 000 0000"
                    value="+20 100 123 4567"
                  />
                </div>

                <div class="error">Please enter your phone number.</div>
              </div>

              <div class="field">
                <div class="field-row">
                  <label for="registerPassword">Password</label>
                </div>

                <div class="input-shell">
                  <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M7 10V7.8C7 5 9.2 3 12 3s5 2 5 4.8V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <path d="M6.2 10h11.6a1.8 1.8 0 0 1 1.8 1.8v6.4a1.8 1.8 0 0 1-1.8 1.8H6.2a1.8 1.8 0 0 1-1.8-1.8v-6.4A1.8 1.8 0 0 1 6.2 10Z" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                  </span>

                  <input
                    id="registerPassword"
                    class="input"
                    type="password"
                    placeholder="••••••••"
                    value="123456"
                  />

                  <button class="eye-btn" type="button" onclick="
                    const pass = document.getElementById('registerPassword');
                    pass.type = pass.type === 'password' ? 'text' : 'password';
                  " aria-label="Toggle password visibility">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M3 12s3.2-5.5 9-5.5S21 12 21 12s-3.2 5.5-9 5.5S3 12 3 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                      <path d="M14.3 9.8A3.2 3.2 0 0 1 9.8 14.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <path d="M4 4l16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                  </button>
                </div>

                <div class="error">Password must be at least 6 characters.</div>
              </div>

              <button class="btn btn-primary btn-wide" type="submit">
                Create Account →
              </button>
            </form>

            <div class="auth-switch">
              Already have an account?
              <a class="link-btn" href="login.html">Sign In</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
